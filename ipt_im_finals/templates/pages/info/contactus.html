{% extends "layout/base.html" %}

{% block content %}
<style>
    .contact-bubble {
        background-color: #ffffff;
        color: var(--primary);
        font-weight: 700;
        padding: 8px 24px;
        border-radius: 8px;
        display: inline-block;
        border: 1px solid var(--border);
        margin-bottom: 35px;
        font-size: 1.5rem;
    }

    .contact-intro {
        font-weight: 500;
        font-size: 1.1rem;
        color: var(--text-main);
        margin-bottom: 35px;
    }

    .social-row {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        width: 100%;
        max-width: 450px;
        margin: 0 auto 25px auto;
        text-align: left;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.9rem 1rem;
        background: #ffffff;
    }

    .social-icon {
        width: 52px;
        height: 52px;
        margin-right: 18px;
        object-fit: contain;
    }

    .social-icon-brand {
        width: 52px;
        height: 52px;
        margin-right: 18px;
        border-radius: 10px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }

    .social-icon-brand svg {
        width: 30px;
        height: 30px;
        fill: #ffffff;
    }

    .social-icon-tiktok {
        background: #000000;
    }

    .social-icon-instagram {
        background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285aeb 90%);
    }

    .social-icon-facebook {
        background: #1877f2;
    }

    .social-text h4 {
        font-weight: 600;
        font-size: 1.3rem;
        margin-bottom: 0;
        color: var(--text-main);
    }

    .social-text p {
        font-weight: 500;
        color: var(--text-muted);
        margin-bottom: 0;
        font-size: 1rem;
    }
</style>

<div class="py-4">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">
            <div class="page-panel bg-white">
                <div class="page-panel-header">
                    Contact Information
                </div>

                <div class="page-panel-body p-5 text-center">
                    <div class="contact-bubble">Contact Us</div>
                    
                    <p class="contact-intro">Reach out to us through the following channels:</p>

                    <div class="social-list">
                        <div class="social-row">
                            <div class="social-icon-brand social-icon-tiktok" aria-hidden="true">
                                <svg viewBox="0 0 24 24" role="img" focusable="false">
                                    <path d="M19.6 8.5c-1.7 0-3.2-.6-4.4-1.8v7.7c0 3.8-3.1 6.9-6.9 6.9s-6.9-3.1-6.9-6.9 3.1-6.9 6.9-6.9c.3 0 .6 0 .9.1v3.4c-.3-.1-.6-.2-.9-.2-1.9 0-3.4 1.5-3.4 3.4s1.5 3.4 3.4 3.4 3.4-1.5 3.4-3.4V2.7h3.4c.2 1.8 1.6 3.2 3.4 3.4V8.5z"/>
                                </svg>
                            </div>
                            <div class="social-text">
                                <h4>TikTok</h4>
                                <p>@KizunaCollections</p>
                            </div>
                        </div>

                        <div class="social-row">
                            <div class="social-icon-brand social-icon-instagram" aria-hidden="true">
                                <svg viewBox="0 0 24 24" role="img" focusable="false">
                                    <path d="M7.8 2h8.4C19.4 2 22 4.6 22 7.8v8.4c0 3.2-2.6 5.8-5.8 5.8H7.8C4.6 22 2 19.4 2 16.2V7.8C2 4.6 4.6 2 7.8 2zm8.2 1.9H8c-2.3 0-4.1 1.8-4.1 4.1V16c0 2.3 1.8 4.1 4.1 4.1H16c2.3 0 4.1-1.8 4.1-4.1V8c0-2.3-1.8-4.1-4.1-4.1zm.7 1.4c.5 0 1 .4 1 1s-.4 1-1 1-1-.4-1-1 .4-1 1-1zM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 1.9a3.1 3.1 0 1 0 0 6.2 3.1 3.1 0 0 0 0-6.2z"/>
                                </svg>
                            </div>
                            <div class="social-text">
                                <h4>Instagram</h4>
                                <p>@KizunaCollections</p>
                            </div>
                        </div>

                        <div class="social-row">
                            <div class="social-icon-brand social-icon-facebook" aria-hidden="true">
                                <svg viewBox="0 0 24 24" role="img" focusable="false">
                                    <path d="M13.5 22v-8h2.7l.4-3h-3.1V9.1c0-.9.3-1.6 1.6-1.6h1.6V4.8c-.3 0-1.2-.1-2.3-.1-2.3 0-3.8 1.4-3.8 4v2.2H8.2v3h2.9v8h2.4z"/>
                                </svg>
                            </div>
                            <div class="social-text">
                                <h4>Facebook</h4>
                                <p>@KizunaCollections</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
