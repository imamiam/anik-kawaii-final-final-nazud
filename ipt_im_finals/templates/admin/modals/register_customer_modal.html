<div class="modal fade register-customer-modal" id="registerCustomerModal" tabindex="-1" aria-labelledby="registerCustomerModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title h4 mb-0" id="registerCustomerModalLabel">
          <svg class="customer-register-icon me-1" viewBox="0 0 16 16" aria-hidden="true">
            <path fill="currentColor" d="M10.5 5a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0zM8 8.5c-2.6 0-4.7 1.5-4.9 3.4-.03.34.24.63.58.63h8.62c.34 0 .61-.29.58-.63-.2-1.9-2.3-3.4-4.9-3.4zM13 2.5a.5.5 0 0 1 .5.5V4H15a.5.5 0 0 1 0 1h-1.5v1a.5.5 0 0 1-1 0V5H11a.5.5 0 0 1 0-1h1.5V3a.5.5 0 0 1 .5-.5z"/>
          </svg>
          Register New Customer
        </h3>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form method="post" action="{{ base_url }}/admin/customers/register?admin={{ is_admin }}&user_id={{ user_id }}&panel=customers-panel">
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label" for="customerRegisterName">Full Name <span class="text-danger">*</span></label>
            <input id="customerRegisterName" type="text" name="name" class="form-control" placeholder="e.g. Maria Santos" required>
          </div>
          <div class="register-customer-grid-2">
            <div>
              <label class="form-label" for="customerRegisterPhone">Phone Number</label>
              <input id="customerRegisterPhone" type="text" name="phone" class="form-control" placeholder="09xx-xxx-xxxx">
            </div>
            <div>
              <label class="form-label" for="customerRegisterEmail">Email Address</label>
              <input id="customerRegisterEmail" type="email" name="email" class="form-control" placeholder="email@example.com" required>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">✓ Register</button>
        </div>
      </form>
    </div>
  </div>
</div>
