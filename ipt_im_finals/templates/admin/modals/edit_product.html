{% extends "layout/base.html" %}
{% block content %}
<div class="page-panel bg-white mx-auto mt-4" style="max-width: 560px;">
    <div class="page-panel-header">
        Edit Product
    </div>
    <div class="page-panel-body">
        <h2 class="section-title h4">Update Inventory Item</h2>
        <p class="section-subtitle">Edit product details to keep your catalog accurate.</p>
        <form action="/edit/{{ product.id }}" method="POST">
            <input type="hidden" name="admin" value="{{ 'True' if is_admin else 'False' }}">
            <input type="hidden" name="user_id" value="{{ user_id }}">

            <div class="mb-3 text-start">
                <label class="fw-bold">Product Name</label>
                <input type="text" name="name" class="form-control" value="{{ product.name }}" required>
            </div>

            <div class="mb-3 text-start">
                <label class="fw-bold">Brand Name</label>
                <input type="text" name="brand" class="form-control" value="{{ product.brand }}" required>
            </div>
            
            <div class="mb-3 text-start">
                <label class="fw-bold">Category</label>
                <select name="category" class="form-select" required>
                    <option value="Keychains" {% if product.category == 'Keychains' %}selected{% endif %}>Keychains</option>
                    <option value="Figurines" {% if product.category == 'Figurines' %}selected{% endif %}>Figurines</option>
                    <option value="Plushies" {% if product.category == 'Plushies' %}selected{% endif %}>Plushies</option>
                </select>
            </div>

            <div class="mb-3 text-start">
                <label class="fw-bold">Image Filename</label>
                <input type="text" name="image" class="form-control" value="{{ product.image }}" required>
            </div>

            <div class="row">
                <div class="col-6 mb-3 text-start">
                    <label class="fw-bold">Price</label>
                    <input type="number" step="0.01" name="price" class="form-control" value="{{ product.price }}" required>
                </div>
                <div class="col-6 mb-3 text-start">
                    <label class="fw-bold">Stock</label>
                    <input type="number" name="stock" class="form-control" value="{{ product.stock }}" required>
                </div>
            </div>

            <button type="submit" class="btn btn-main w-100 fw-bold mt-3">
                Save Changes
            </button>
        </form>
    </div>
</div>
{% endblock %}
